<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>R2 图片上传器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Cloudflare R2 · Hugo 图床</p>
        <h1>在线图片上传器</h1>
        <p class="description">
          在浏览器本地压缩为 WebP，上传到 R2，并生成可直接粘贴到 Pages CMS / Hugo 文章中的 Markdown 图片链接。
        </p>
      </section>

      <section class="card" aria-labelledby="upload-settings-title">
        <h2 id="upload-settings-title">上传设置</h2>
        <div class="form-grid">
          <label class="field field-wide" for="token">
            <span>上传 Token</span>
            <input
              id="token"
              name="token"
              type="password"
              autocomplete="off"
              placeholder="输入 Cloudflare Pages Secret 中配置的 UPLOAD_TOKEN"
              required
            />
          </label>

          <label class="field" for="category">
            <span>分类</span>
            <select id="category" name="category" required>
              <option value="blog">blog</option>
              <option value="travel">travel</option>
              <option value="books">books</option>
              <option value="misc">misc</option>
            </select>
          </label>

          <label class="field" for="slug">
            <span>Slug</span>
            <input id="slug" name="slug" type="text" placeholder="例如 hugo-pages-cms" />
            <small>留空时会根据第一个文件名自动生成安全 slug。</small>
          </label>

          <label class="field" for="alt-text">
            <span>Alt 文本</span>
            <input id="alt-text" name="alt-text" type="text" placeholder="例如 Hugo Pages CMS 截图" />
            <small>留空时使用 slug；多图会自动追加序号。</small>
          </label>

          <label class="field" for="compression-preset">
            <span>压缩预设</span>
            <select id="compression-preset" name="compression-preset">
              <option value="balanced">均衡：最长边 1600px · quality 0.82</option>
              <option value="small">轻量：最长边 1200px · quality 0.72</option>
              <option value="large">高清：最长边 2200px · quality 0.9</option>
              <option value="original">仅转 WebP：保留尺寸 · quality 0.86</option>
            </select>
          </label>

          <label class="field field-wide" for="naming-mode">
            <span>上传前重命名规则</span>
            <select id="naming-mode" name="naming-mode">
              <option value="category-date-sequence">category/YYYY/MM/slug-序号.webp</option>
              <option value="category-sequence">category/slug-序号.webp</option>
              <option value="date-category-sequence">YYYY/MM/category/slug-序号.webp</option>
              <option value="category-timestamp">category/YYYY/MM/slug-时间戳-序号.webp</option>
              <option value="category-original">category/YYYY/MM/原文件名-序号.webp</option>
            </select>
            <small>所有 key 均在浏览器端生成；不会扫描 R2 bucket。</small>
          </label>
        </div>
      </section>

      <section class="card" aria-labelledby="drop-title">
        <h2 id="drop-title">选择图片</h2>
        <div id="drop-zone" class="drop-zone" tabindex="0" role="button" aria-describedby="drop-help">
          <input id="file-input" type="file" accept="image/*" multiple hidden />
          <div class="drop-icon" aria-hidden="true">⇪</div>
          <p><strong>拖拽图片到这里</strong>，或点击选择文件</p>
          <p id="drop-help" class="muted">支持多图上传；选择后不会自动裁剪或上传，请先拖拽下方文件条目排序，再点击按钮按顺序裁剪。</p>
        </div>
        <div id="file-list" class="file-list" aria-live="polite"></div>
        <button id="upload-button" class="primary-button" type="button" disabled>裁剪并上传</button>
      </section>

      <section class="card results-card" aria-labelledby="results-title">
        <div class="results-header">
          <div>
            <h2 id="results-title">上传结果</h2>
            <p class="muted">上传成功后会显示体积对比、公开 URL 和多种复制格式。</p>
          </div>
          <div class="copy-toolbar">
            <label class="field inline-field" for="copy-format">
              <span>复制格式</span>
              <select id="copy-format" name="copy-format">
                <option value="markdown">Markdown</option>
                <option value="html">HTML</option>
                <option value="hugo">Hugo figure</option>
              </select>
            </label>
            <button id="copy-selected-format" class="secondary-button" type="button" disabled>复制所选格式</button>
            <button id="copy-markdown" class="secondary-button" type="button" disabled>一键复制全部 Markdown</button>
          </div>
        </div>
        <div id="status" class="status" role="status" aria-live="polite"></div>
        <div id="results" class="results"></div>
      </section>
    </main>

    <div id="crop-modal" class="crop-modal" role="dialog" aria-modal="true" aria-labelledby="crop-title" hidden>
      <div class="crop-dialog">
        <div class="crop-header">
          <div>
            <p id="crop-progress" class="eyebrow crop-step">1/1</p>
            <h2 id="crop-title">裁剪图片</h2>
            <p id="crop-filename" class="muted crop-filename"></p>
          </div>
          <button id="cancel-crop" class="icon-button" type="button" aria-label="取消裁剪">×</button>
        </div>

        <div class="crop-body">
          <div class="crop-preview">
            <img id="crop-image" alt="待裁剪图片预览" />
          </div>

          <label class="field crop-ratio-field" for="crop-ratio">
            <span>裁剪比例</span>
            <select id="crop-ratio" name="crop-ratio">
              <option value="free">自由裁剪</option>
              <option value="original">原图比例</option>
              <option value="1:1">1:1</option>
              <option value="4:3">4:3</option>
              <option value="3:2">3:2</option>
              <option value="16:9">16:9</option>
              <option value="9:16">9:16</option>
            </select>
          </label>
        </div>

        <div class="crop-actions">
          <button id="confirm-crop" class="primary-button" type="button">确认裁剪并上传</button>
          <button id="skip-crop" class="secondary-button" type="button">跳过裁剪</button>
          <button id="cancel-crop-button" class="secondary-button danger-button" type="button">取消</button>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
